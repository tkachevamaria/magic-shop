<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotterShop — Магазин волшебных товаров</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header class="main-header" id="header-container"></header>

    <div class="page-container">
        
        <aside class="sidebar">
            <h2 class="sidebar-title">Категории</h2>
            <nav class="categories-menu">
                <a href="#" class="menu-link">⚡ Зелья</a>
                <a href="#" class="menu-link">⚡ Палочки</a>
                <a href="#" class="menu-link">⚡ Книги</a>
                <a href="#" class="menu-link">⚡ Котлы</a>
                <a href="#" class="menu-link">⚡ Метлы</a>
                <a href="#" class="menu-link">⚡ Мантии</a>
                <a href="#" class="menu-link">⚡ Почта</a>
                <a href="#" class="menu-link">⚡ Питомцы</a>
            </nav>

            <div class="shops-dropdown">
                <span>Магазины</span>
                <span class="arrow">▼</span>
            </div>
        </aside>

        <main class="products-container" id="products-grid">
            
            <div class="product-card">
                <div class="card-image-area">🔮</div>
                <div class="card-footer">
                    <span class="product-name">Амортенция</span>
                    <span class="product-price">700 Галлеонов</span>
                </div>
            </div>

            <div class="product-card">
                <div class="card-image-area">🪄</div>
                <div class="card-footer">
                    <span class="product-name">Палочка</span>
                    <span class="product-price">300 Галлеонов</span>
                </div>
            </div>

            <div class="product-card">
                <div class="badge-sale">Скидка!</div>
                <div class="card-image-area">📚</div>
                <div class="card-footer">
                    <span class="product-name">Учебник</span>
                    <span class="product-price">300 Галлеонов</span>
                </div>
            </div>

            <div class="product-card">
                <div class="card-image-area">🧹</div>
                <div class="card-footer">
                    <span class="product-name">Нимбус</span>
                    <span class="product-price">400 Галлеонов</span>
                </div>
            </div>

            <div class="product-card">
                <div class="card-image-area">🦉</div>
                <div class="card-footer">
                    <span class="product-name">Сова</span>
                    <span class="product-price">200 Галлеонов</span>
                </div>
            </div>

        </main>
    </div>

    <script>
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error('Блокировка браузера');
                return response.text();
            })
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(err => {
                // Если твой компьютер заблокировал файл с диска, скрипт подставит код сам!
                document.getElementById('header-container').innerHTML = `
                    <div class="header-content">
                        <div class="logo">DA <span class="logo-sub">Logo</span></div>
                        <div class="search-container">
                            <input type="text" placeholder="ПОИСК..." class="search-input">
                            <span class="search-arrow">🔍</span>
                        </div>
                        <div class="header-icons">
                            <button class="icon-btn" title="Фильтр">⏳</button>
                            <button class="icon-btn" title="Корзина">🛒</button>
                            <button class="icon-btn" title="Профиль">🧙‍♂️</button>
                            <button class="icon-btn" title="Уведомления">🔔</button>
                        </div>
                    </div>
                `;
            });
    </script>

</body>
</html>
