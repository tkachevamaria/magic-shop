<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotterShop — Магазин волшебных товаров</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/products.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
    <div class="stars-overlay"></div>

    <header class="main-header" id="header-container"></header>

    <div class="page-container">

            <h2 class="sidebar-title">Категории</h2>
            <nav class="categories-menu">

                <a href="#" class="menu-link">⚡ Почта</a>
                <a href="#" class="menu-link">⚡ Питомцы</a>
            </nav>

            <div class="shops-dropdown">
                <span>Магазины</span>
                <span class="arrow">▼</span>
            </div>
        </aside>

        <main class="products-container" id="products-grid">
            <!-- Карточки товаров рендерятся из mockData.js через renderProducts.js -->
        </main>
    </div>

    <script src="../js/loadHeader.js"></script>
    <script src="../js/mockCards.js"></script>

</html>
