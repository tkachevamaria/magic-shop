<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotterShop — Товар</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header class="main-header" id="header-container"></header>

    <div class="product-container">
        <div id="product-content">
            <div style="text-align: center; padding: 100px; font-size: 28px;">Загрузка...</div>
        </div>
    </div>

    <script src="../js/loadHeader.js"></script>
    <script src="../js/mockProductPages.js"></script>
    <script src="../js/renderProductPage.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        
        let product = null;
        if (typeof products !== 'undefined') {
            product = products.find(p => p.id === productId);
        }
        
        if (typeof renderProductPage === 'function') {
            renderProductPage(product);
        }
    </script>

</body>
</html>
